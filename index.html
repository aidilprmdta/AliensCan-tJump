<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aliens Can't Jump</title>
    
    <link rel="stylesheet" href="src/input.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center h-screen w-screen overflow-hidden touch-none select-none">

    <div id="game-container" 
         x-data="{ score: 0, highScore: parseInt(localStorage.getItem('alien_high_score')) || 0, isGameOver: false }" 
         @game-over.window=" isGameOver = true;
            if(score > highScore) { 
                highScore = score; 
                localStorage.setItem('alien_high_score', score); 
            }
         "
         @update-score.window="score = $event.detail"
         class="relative w-full h-full sm:h-[400px] sm:w-[800px] sm:max-w-4xl bg-slate-900 border-b-8 border-green-500 overflow-hidden sm:rounded-2xl sm:shadow-2xl">

        <div class="absolute top-4 left-4 text-green-400 font-mono text-xl z-10 flex gap-4">
            <div>HI <span x-text="highScore.toString().padStart(5, '0')"></span></div>
            <div x-text="score.toString().padStart(5, '0')"></div>
        </div>
        
        <div id="alien" class="absolute bottom-0 left-10 w-12 h-12 text-5xl flex items-center justify-center drop-shadow-[0_0_15px_rgba(74,222,128,0.8)] z-10 transition-transform">
            👽
        </div>

        <div x-show="isGameOver" style="display: none;" class="absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center">
            <h1 class="text-red-500 text-4xl font-black mb-4 drop-shadow-[0_0_10px_#ef4444]">MISSION FAILED</h1>
            <button @click="window.location.reload()" class="bg-green-500 text-black px-6 py-2 font-bold hover:bg-green-400 rounded">RETRY</button>
        </div>



        //test klo jelek mon maap
        <div id="main-menu" class="absolute inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center">
    <h1 class="text-green-500 text-5xl font-black mb-10 italic italic italic italic italic italic">ALIENS CAN'T JUMP</h1>
    <div class="flex flex-col gap-4 w-52">
        <button id="play-button" class="bg-green-500 text-black py-3 rounded-lg font-bold hover:bg-green-400 transform active:scale-95 transition">PLAY</button>
        <button id="settings-button" class="bg-slate-700 text-white py-3 rounded-lg font-bold hover:bg-slate-600 transition">SETTINGS</button>
    </div>
    </div>

    <div id="settings-menu" class="absolute inset-0 bg-black/90 z-[60] flex flex-col items-center justify-center hidden">
    <h2 class="text-white text-2xl font-bold mb-8 font-mono">SETTINGS</h2>
    <div class="w-64 space-y-6">
        <div>
            <label class="text-slate-400 text-sm block mb-2">Music Volume</label>
            <input type="range" id="volume-slider" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-green-500">
        </div>
        <button id="back-button" class="w-full bg-slate-200 text-black py-2 rounded font-bold hover:bg-white transition">BACK</button>
    </div>
    </div>

////----klo jelek mon maap, tapi orgnya ganteng
        
    </div>

</body>
<script type="module" src="src/main.js"></script>
</html>
